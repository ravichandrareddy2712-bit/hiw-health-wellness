name: hiw
description: "HIW - Health Is Wealth"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2


  # UI & Core
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0
  flutter_spinkit: ^5.2.0
  animated_text_kit: ^4.2.2
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2
  # flutter_timezone removed due to Kotlin compatibility issues
  intl: ^0.18.1
  permission_handler: ^11.3.1

  # Camera & Image
  camera: ^0.10.5+5
  image: ^4.1.3

  # 🌐 NETWORK (ML API)
  http: ^1.2.0

  # 🧠 LOCAL STORAGE (HIVE)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_colorpicker: ^1.1.0
  flutter_screenutil: 5.9.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  # 🛠 CODE GENERATION
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/christmas/
    - assets/sankranti/
    - assets/new_year/
